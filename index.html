<body class="bg-background text-on-background font-body-md selection:bg-primary-container/30">

<main class="pt-16 pb-24 min-h-screen px-margin-mobile md:px-margin-desktop max-w-7xl mx-auto">

    <script>
        // Micro-interaction for add buttons (delegated for dynamic content)
        document.addEventListener('click', function(e) {
            const btn = e.target.closest('button:has(.material-symbols-outlined[data-icon="add"])');
            if (btn) {
                e.preventDefault(); // Prevent navigating if wrapped in <a>
                const icon = btn.querySelector('span');
                icon.innerText = 'done';
                btn.classList.replace('bg-primary', 'bg-tertiary-container');
                setTimeout(() => {
                    icon.innerText = 'add';
                    btn.classList.replace('bg-tertiary-container', 'bg-primary');
                }, 2000);
            }
        });

        // Simple CSV Parser
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            const results = [];
            
            for (let i = 1; i < lines.length; i++) {
                let obj = {};
                let currentline = lines[i];
                let values = [];
                let inQuotes = false;
                let val = '';
                
                for (let j = 0; j < currentline.length; j++) {
                    let char = currentline[j];
                    if (char === '"' && inQuotes && currentline[j+1] === '"') {
                        val += '"'; j++;
                    } else if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(val.trim());
                        val = '';
                    } else {
                        val += char;
                    }
                }
                values.push(val.trim());
                
                headers.forEach((header, index) => {
                    obj[header] = values[index];
                });
                results.push(obj);
            }
            return results;
        }

        // Fetch and Render Products
        let allProducts = [];
        
        async function loadProducts() {
            try {
                const response = await fetch('database/products.csv', { cache: 'no-cache' });
                const csvText = await response.text();
                allProducts = parseCSV(csvText);
                renderProducts(allProducts);
            } catch (err) {
                console.error('Error loading products:', err);
                document.getElementById('product-grid').innerHTML = '<p class="col-span-full text-center text-error p-4">Error loading products database. Make sure you are running a local web server to view this page dynamically.</p>';
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            products.forEach(p => {
                const badgeHtml = p.badge ? `<span class="absolute top-2 left-2 px-3 py-1 bg-tertiary-container/90 text-on-tertiary-container rounded-full font-label-sm text-label-sm">${p.badge}</span>` : '';
                
                const html = `
                <a href="product.html?id=${p.id}" class="group flex flex-col bg-surface-container-lowest rounded-xl overflow-hidden border border-outline/10 hover:shadow-xl hover:shadow-secondary/5 transition-all duration-300">
                    <div class="relative aspect-square overflow-hidden bg-surface-container">
                        <img class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt="${p.name}" src="${p.image_url}"/>
                        ${badgeHtml}
                    </div>
                    <div class="p-md flex flex-col flex-grow gap-2">
                        <div>
                            <h3 class="font-headline-md text-headline-md text-on-surface group-hover:text-primary transition-colors">${p.name}</h3>
                            <p class="font-label-sm text-label-sm text-on-surface-variant">${p.weight} | ${p.category}</p>
                        </div>
                        <div class="mt-auto flex items-center justify-between gap-2 pt-2">
                            <span class="font-label-md text-label-md text-primary-container text-base">₹${p.price}</span>
                            <button class="bg-primary text-on-primary w-8 h-8 rounded-full flex items-center justify-center transition-transform hover:scale-105 active:scale-95 shadow-md">
                                <span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>
                            </button>
                        </div>
                    </div>
                </a>`;
                
                grid.insertAdjacentHTML('beforeend', html);
            });
        }

        // Category Filter Logic
        document.querySelectorAll('section button').forEach(btn => {
            btn.addEventListener('click', function() {
                // Update active state
                document.querySelectorAll('section button').forEach(b => {
                    b.classList.replace('bg-primary', 'bg-surface-container');
                    b.classList.replace('text-on-primary', 'text-on-surface-variant');
                });
                this.classList.replace('bg-surface-container', 'bg-primary');
                this.classList.replace('text-on-surface-variant', 'text-on-primary');
                
                // Filter products
                const category = this.innerText;
                if (category === 'All Snacks') {
                    renderProducts(allProducts);
                } else {
                    const filtered = allProducts.filter(p => p.category === category);
                    renderProducts(filtered);
                }
            });
        });

        // Search Logic
        document.querySelector('input[type="text"]').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(search));
            renderProducts(filtered);
            
            // Reset category buttons
            document.querySelectorAll('section button').forEach((b, i) => {
                if(i===0) {
                    b.classList.replace('bg-surface-container', 'bg-primary');
                    b.classList.replace('text-on-surface-variant', 'text-on-primary');
                } else {
                    b.classList.replace('bg-primary', 'bg-surface-container');
                    b.classList.replace('text-on-primary', 'text-on-surface-variant');
                }
            });
        });

        // Init
        loadProducts();

    </script>
