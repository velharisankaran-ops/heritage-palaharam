<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Heritage Palaharam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body class="bg-orange-50 font-sans min-h-screen">
    <nav class="bg-amber-800 text-white shadow-md p-4 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2">
            <span class="material-symbols-outlined">arrow_back</span> Back to Store
        </a>
        <h1 class="font-bold text-xl">Checkout</h1>
        <div class="w-8"></div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 py-8">
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Order Summary</h2>
            <ul id="cart-items" class="divide-y divide-gray-200 mb-4">
                <!-- Dynamic Cart Items -->
            </ul>
            <div class="flex justify-between items-center text-lg font-bold text-amber-800 pt-2 border-t border-gray-200">
                <span>Total:</span>
                <span id="cart-total">₹0</span>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Shipping Details</h2>
            <form id="checkout-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Full Name</label>
                    <input type="text" id="customer_name" required class="mt-1 w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Phone Number</label>
                    <input type="tel" id="phone" required class="mt-1 w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Delivery Address</label>
                    <textarea id="address" rows="3" required class="mt-1 w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                </div>
                
                <div id="error-msg" class="text-red-500 text-sm hidden"></div>
                
                <button type="submit" id="submit-btn" class="w-full bg-amber-700 hover:bg-amber-800 text-white font-bold py-3 px-4 rounded-full transition-colors flex items-center justify-center gap-2 mt-4 shadow-lg">
                    <span class="material-symbols-outlined">check_circle</span> Place Order
                </button>
            </form>
        </div>
    </main>

    <div id="success-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center mx-4">
            <span class="material-symbols-outlined text-6xl text-green-500 mb-4">task_alt</span>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Order Placed!</h2>
            <p class="text-gray-600 mb-6">Your traditional snacks are being packed with love.</p>
            <a href="index.html" class="inline-block w-full bg-amber-700 text-white font-bold py-3 rounded-full hover:bg-amber-800 transition-colors">Continue Shopping</a>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('heritage_cart')) || [];
        
        function renderCart() {
            const cartList = document.getElementById('cart-items');
            if(cart.length === 0) {
                cartList.innerHTML = '<li class="py-4 text-gray-500 text-center">Your cart is empty.</li>';
                document.getElementById('submit-btn').disabled = true;
                document.getElementById('submit-btn').classList.add('opacity-50');
                return;
            }

            let total = 0;
            cartList.innerHTML = '';
            cart.forEach((item, index) => {
                total += item.price * item.quantity;
                cartList.innerHTML += `
                    <li class="py-3 flex justify-between items-center">
                        <div class="flex flex-col">
                            <span class="font-medium text-gray-800">${item.name}</span>
                            <span class="text-xs text-gray-500">₹${item.price} x ${item.quantity}</span>
                        </div>
                        <div class="font-medium text-gray-900">₹${item.price * item.quantity}</div>
                    </li>
                `;
            });
            document.getElementById('cart-total').innerText = '₹' + total;
        }

        renderCart();

        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Processing...';
            btn.disabled = true;

            const payload = {
                customer_name: document.getElementById('customer_name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                cart_data: cart,
                total_price: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0)
            };

            try {
                // Determine API path based on environment
                const isLocalhost = window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const apiPath = isLocalhost ? 'http://localhost/api/place_order.php' : 'api/place_order.php';

                const response = await fetch(apiPath, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    localStorage.removeItem('heritage_cart');
                    document.getElementById('success-modal').classList.remove('hidden');
                } else {
                    const data = await response.json();
                    document.getElementById('error-msg').innerText = data.message || "Failed to place order.";
                    document.getElementById('error-msg').classList.remove('hidden');
                    btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Place Order';
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('error-msg').innerText = "Network error. Make sure the PHP backend is configured correctly (update db_connect.php).";
                document.getElementById('error-msg').classList.remove('hidden');
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Place Order';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
