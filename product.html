<body class="bg-background text-on-background font-body-md selection:bg-primary-container/30">
<div class="paper-grain"></div>

<!-- TopAppBar -->
<nav class="fixed top-0 left-0 w-full z-50 bg-surface flex justify-between items-center px-margin-mobile h-12 shadow-none">
<div class="flex items-center gap-3">
<a href="index.html" class="flex items-center justify-center w-8 h-8 hover:bg-surface-container-low transition-colors rounded-full text-on-surface-variant">
<span class="material-symbols-outlined text-xl" data-icon="arrow_back">arrow_back</span>
</a>
</div>
<div class="flex items-center gap-2">
<button class="flex items-center justify-center w-8 h-8 hover:bg-surface-container-low transition-colors rounded-full text-on-surface-variant relative">
<span class="material-symbols-outlined text-xl" data-icon="favorite_border">favorite_border</span>
</button>
<button class="flex items-center justify-center w-8 h-8 hover:bg-surface-container-low transition-colors rounded-full text-on-surface-variant relative">
<span class="material-symbols-outlined text-xl" data-icon="share">share</span>
</button>
</div>
</nav>

<!-- Product Image hero -->
<div id="hero-image-container" class="pt-12 w-full h-[50vh] md:h-[60vh] bg-surface-container relative">
<!-- Dynamic Image -->
</div>

<!-- Product Details -->
<main id="product-details-container" class="px-margin-mobile md:px-margin-desktop max-w-3xl mx-auto -mt-6 relative z-10 pb-32">
<!-- Dynamic Details -->
</main>

<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full z-50 bg-surface-container dark:bg-surface-container-highest rounded-t-2xl shadow-[0_-4px_20px_rgba(116,88,74,0.1)] px-margin-mobile py-4 flex items-center justify-between gap-4 border-t border-outline/10">
    <!-- Quantity Selector -->
    <div class="flex items-center justify-between bg-surface-container-low border border-outline/20 rounded-full px-2 py-1 w-32">
        <button class="w-8 h-8 flex items-center justify-center text-on-surface rounded-full hover:bg-surface-container transition-colors" onclick="updateQty(-1)">
            <span class="material-symbols-outlined text-[18px]">remove</span>
        </button>
        <span id="qty-val" class="font-label-md text-label-md text-on-surface w-4 text-center">1</span>
        <button class="w-8 h-8 flex items-center justify-center text-on-surface rounded-full hover:bg-surface-container transition-colors" onclick="updateQty(1)">
            <span class="material-symbols-outlined text-[18px]">add</span>
        </button>
    </div>

    <!-- Add to Cart -->
    <button class="flex-1 bg-primary text-on-primary rounded-full py-3 px-6 font-label-md text-label-md flex items-center justify-center gap-2 hover:bg-primary/90 transition-transform active:scale-95 shadow-md">
        <span class="material-symbols-outlined text-[20px]">shopping_bag</span>
        Add to Cart
    </button>
</div>

<script>
    function updateQty(change) {
        const qtyEl = document.getElementById('qty-val');
        let current = parseInt(qtyEl.innerText);
        current += change;
        if(current < 1) current = 1;
        qtyEl.innerText = current;
    }

    function parseCSV(text) {
        const lines = text.trim().split('\n');
        const headers = lines[0].split(',').map(h => h.trim());
        const results = [];
        for (let i = 1; i < lines.length; i++) {
            let obj = {};
            let currentline = lines[i];
            let values = [];
            let inQuotes = false;
            let val = '';
            for (let j = 0; j < currentline.length; j++) {
                let char = currentline[j];
                if (char === '"' && inQuotes && currentline[j+1] === '"') {
                    val += '"'; j++;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    values.push(val.trim());
                    val = '';
                } else {
                    val += char;
                }
            }
            values.push(val.trim());
            headers.forEach((header, index) => {
                obj[header] = values[index];
            });
            results.push(obj);
        }
        return results;
    }

    async function loadProduct() {
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id') || '1'; // Default to 1 if not provided
        
        try {
            const response = await fetch('database/products.csv');
            const csvText = await response.text();
            const products = parseCSV(csvText);
            
            const product = products.find(p => p.id === productId);
            if(product) {
                renderProduct(product);
            } else {
                document.getElementById('product-details-container').innerHTML = '<p class="text-error p-8 text-center">Product not found.</p>';
            }
        } catch (err) {
            console.error(err);
            document.getElementById('product-details-container').innerHTML = '<p class="text-error p-8 text-center">Error loading database. Ensure you are running a local server.</p>';
        }
    }

    function renderProduct(p) {
        document.title = `Heritage Palaharam - ${p.name}`;
        
        // Render Hero Image
        const heroContainer = document.getElementById('hero-image-container');
        heroContainer.innerHTML = `<img class="w-full h-full object-cover" alt="${p.name}" src="database/images/${p.image_filename}" />`;

        // Render Details
        const detailsContainer = document.getElementById('product-details-container');
        const badgeHtml = p.badge ? `<span class="px-3 py-1 bg-tertiary-container/90 text-on-tertiary-container rounded-full font-label-sm text-label-sm">${p.badge}</span>` : '';
        const originalPriceHtml = p.original_price ? `<span class="font-label-sm text-label-sm text-outline line-through">₹${p.original_price}</span>` : '';

        detailsContainer.innerHTML = `
        <div class="bg-surface rounded-t-3xl p-md shadow-[0_-10px_30px_rgba(116,88,74,0.05)] border-t border-outline/10 min-h-screen">
            <div class="flex items-center gap-2 mb-2">
                ${badgeHtml}
                <span class="font-label-sm text-label-sm text-secondary uppercase tracking-widest flex items-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">local_fire_department</span> ${p.category}
                </span>
            </div>

            <div class="flex justify-between items-start mb-4">
                <div>
                    <h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-1">${p.name}</h1>
                    <p class="font-body-lg text-body-lg text-on-surface-variant">${p.weight} Pack</p>
                </div>
                <div class="text-right">
                    <span class="block font-headline-lg text-headline-lg text-primary-container">₹${p.price}</span>
                    ${originalPriceHtml}
                </div>
            </div>

            <div class="mb-lg">
                <h3 class="font-label-md text-label-md text-on-surface mb-2 border-b border-outline/10 pb-1">ABOUT THIS DELICACY</h3>
                <p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
                    ${p.description}
                </p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-lg bg-surface-container-low p-4 rounded-xl border border-outline/5">
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <span class="material-symbols-outlined text-secondary text-[18px]">nutrition</span>
                        <h4 class="font-label-md text-label-md text-on-surface">Ingredients</h4>
                    </div>
                    <p class="font-label-sm text-label-sm text-on-surface-variant">${p.ingredients}</p>
                </div>
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <span class="material-symbols-outlined text-secondary text-[18px]">calendar_month</span>
                        <h4 class="font-label-md text-label-md text-on-surface">Shelf Life</h4>
                    </div>
                    <p class="font-label-sm text-label-sm text-on-surface-variant">${p.shelf_life}</p>
                </div>
            </div>
        </div>`;
    }

    loadProduct();
</script>
</body></html>
